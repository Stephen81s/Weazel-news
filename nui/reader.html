<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weazel News Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reader" class="page-hidden">
  <main class="panel reader-panel">
    <section class="reader-toolbar card">
      <div>
        <p class="eyebrow">Edition du jour</p>
        <h1 id="readerTitle">Weazel News</h1>
        <p id="readerMeta" class="subtitle">Aucun journal charge.</p>
      </div>

      <div class="button-row compact">
        <button id="zoomOutButton" class="secondary">-</button>
        <button id="zoomInButton" class="secondary">+</button>
        <button id="closeReaderButton" class="primary">Fermer</button>
      </div>
    </section>

    <section class="reader-stage card">
      <div id="readerViewport" class="reader-viewport">
        <img id="readerImage" alt="Journal Weazel News">
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
